name: Nuxt CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nuxt-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static output
        run: npm run generate
